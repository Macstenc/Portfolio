<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Maciej Stencel portfolio cover</title>
  <desc id="desc">Social sharing cover image for the portfolio website.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0c172a"/>
      <stop offset="100%" stop-color="#06101a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#8ad0b3"/>
      <stop offset="100%" stop-color="#e7b87c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1000" cy="120" r="150" fill="#8ad0b3" opacity=".08"/>
  <circle cx="180" cy="540" r="220" fill="#8ab5ff" opacity=".07"/>
  <rect x="72" y="72" width="1056" height="486" rx="36" fill="none" stroke="#213450"/>
  <rect x="92" y="92" width="228" height="56" rx="28" fill="url(#accent)"/>
  <text x="206" y="128" fill="#08101d" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" text-anchor="middle" letter-spacing="4">PORTFOLIO</text>
  <text x="92" y="262" fill="#f4f7fb" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="700">Maciej Stencel</text>
  <text x="92" y="334" fill="#c7d3e2" font-family="Arial, Helvetica, sans-serif" font-size="28" letter-spacing="4">WEB DEVELOPER / SYSTEMS &amp; INFRASTRUCTURE SPECIALIST</text>
  <text x="92" y="416" fill="#9fb0c6" font-family="Arial, Helvetica, sans-serif" font-size="28">Accessible interfaces, production-ready delivery, Django, Docker, and practical product work.</text>
  <rect x="92" y="466" width="410" height="2" fill="url(#accent)"/>
  <text x="92" y="524" fill="#f4f7fb" font-family="Arial, Helvetica, sans-serif" font-size="26">macstenc.github.io/Portfolio</text>
</svg>
