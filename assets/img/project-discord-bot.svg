<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title">
  <title id="title">Discord bot placeholder</title>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f1b31"/>
      <stop offset="100%" stop-color="#08101d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#8ab5ff"/>
      <stop offset="100%" stop-color="#8ad0b3"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="90" y="90" width="1420" height="820" rx="42" fill="none" stroke="#243752"/>
  <rect x="160" y="170" width="1280" height="100" rx="24" fill="#0d192a" stroke="#2b3e5c"/>
  <rect x="160" y="320" width="580" height="520" rx="28" fill="#0d192a" stroke="#2b3e5c"/>
  <rect x="800" y="320" width="640" height="140" rx="24" fill="#0d192a" stroke="#2b3e5c"/>
  <rect x="800" y="500" width="640" height="140" rx="24" fill="#0d192a" stroke="#2b3e5c"/>
  <rect x="800" y="680" width="420" height="92" rx="30" fill="url(#accent)"/>
  <text x="220" y="432" fill="#f4f7fb" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="700">DiscordBot</text>
  <text x="220" y="498" fill="#f4f7fb" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="700">Community Toolkit</text>
  <text x="220" y="586" fill="#9fb0c6" font-family="Arial, Helvetica, sans-serif" font-size="26">Music playback, AutoDJ, AI mixtapes, server tools, and game feeds.</text>
  <rect x="220" y="652" width="260" height="52" rx="26" fill="url(#accent)" opacity=".84"/>
  <text x="860" y="404" fill="#f4f7fb" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Playback and queue</text>
  <text x="860" y="448" fill="#9fb0c6" font-family="Arial, Helvetica, sans-serif" font-size="24">YouTube, Spotify, queue control, loop, shuffle, and volume.</text>
  <text x="860" y="584" fill="#f4f7fb" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Server automation</text>
  <text x="860" y="628" fill="#9fb0c6" font-family="Arial, Helvetica, sans-serif" font-size="24">Voice groups, dashboard setup, free games feed, and admin helpers.</text>
</svg>
